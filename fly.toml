# fly.toml — Nailed It voice demo
# Secrets (NOT here): set with `fly secrets set DEEPGRAM_API_KEY=… TOGETHER_API_KEY=…`

app = "nailed-it-deepgram"
primary_region = "iad"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine warm — this is a sub-second latency demo, cold starts hurt.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
